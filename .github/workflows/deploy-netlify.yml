# Publishes dashboard/ to https://bluetti-edm-dashboard.netlify.app/
# Requires repo secrets:
#   NETLIFY_AUTH_TOKEN — Netlify User settings → Applications → Personal access tokens
#   NETLIFY_SITE_ID    — f64cc0c9-dcf5-4028-a1d8-fdc1de1d61d2 (bluetti-edm-dashboard)
name: Deploy Dashboard to Netlify

on:
  push:
    branches: [main, master]
    paths:
      - "dashboard/**"
      - "netlify.toml"
      - ".github/workflows/deploy-netlify.yml"
  workflow_dispatch:

concurrency:
  group: netlify-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          rm -rf netlify-publish
          cp -r dashboard netlify-publish
          rm -f netlify-publish/CNAME
          cp netlify.toml netlify-publish/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: netlify-publish
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy dashboard ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          fails-without-credentials: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
