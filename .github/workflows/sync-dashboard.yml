name: Sync Klaviyo Dashboard

on:
  schedule:
    # 每天 06:00 UTC（北京时间 14:00）— 预设区间 + 上月 / 本月至今
    - cron: "0 6 * * *"
    # 每周一 07:00 UTC 补跑自定义区间（与每日任务互补）
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Preset days (7/30/60/90/all); ignored when custom dates set"
        required: false
        type: choice
        options:
          - "all"
          - "7"
          - "30"
          - "60"
          - "90"
      start_date:
        description: "Custom start YYYY-MM-DD (optional)"
        required: false
        type: string
      end_date:
        description: "Custom end YYYY-MM-DD (optional)"
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-dashboard
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dashboard data from Klaviyo API
        env:
          KLAVIYO_API_KEY_US: ${{ secrets.KLAVIYO_API_KEY_US }}
          KLAVIYO_API_KEY_AU: ${{ secrets.KLAVIYO_API_KEY_AU }}
          KLAVIYO_API_KEY_CA: ${{ secrets.KLAVIYO_API_KEY_CA }}
          KLAVIYO_API_KEY_UK: ${{ secrets.KLAVIYO_API_KEY_UK }}
          KLAVIYO_API_KEY_FR: ${{ secrets.KLAVIYO_API_KEY_FR }}
          KLAVIYO_API_KEY_DE: ${{ secrets.KLAVIYO_API_KEY_DE }}
          KLAVIYO_API_KEY_IT: ${{ secrets.KLAVIYO_API_KEY_IT }}
          KLAVIYO_API_KEY_EU: ${{ secrets.KLAVIYO_API_KEY_EU }}
          KLAVIYO_API_KEY_ES: ${{ secrets.KLAVIYO_API_KEY_ES }}
          KLAVIYO_API_KEY_JP: ${{ secrets.KLAVIYO_API_KEY_JP }}
          KLAVIYO_API_KEY_CL: ${{ secrets.KLAVIYO_API_KEY_CL }}
        working-directory: scripts
        run: |
          sync_custom_ranges() {
            LAST_MONTH_START=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y-%m-%d)
            LAST_MONTH_END=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m-%d)
            MTD_START=$(date -u +%Y-%m-01)
            MTD_END=$(date -u +%Y-%m-%d)
            echo "Custom range (with MoM/YoY + flowYoY): last month ${LAST_MONTH_START} .. ${LAST_MONTH_END}"
            python sync_dashboard.py --start "${LAST_MONTH_START}" --end "${LAST_MONTH_END}"
            if [ "${MTD_START}" != "${LAST_MONTH_START}" ] || [ "${MTD_END}" != "${LAST_MONTH_END}" ]; then
              echo "Custom range (with MoM/YoY + flowYoY): month-to-date ${MTD_START} .. ${MTD_END}"
              python sync_dashboard.py --start "${MTD_START}" --end "${MTD_END}"
            fi
          }

          if [ -n "${{ inputs.start_date }}" ] && [ -n "${{ inputs.end_date }}" ]; then
            echo "Custom dispatch: syncing with MoM/YoY comparisons + flowYoY"
            python sync_dashboard.py --start "${{ inputs.start_date }}" --end "${{ inputs.end_date }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.days }}" != "all" ]; then
            python sync_dashboard.py --days "${{ inputs.days }}"
          else
            for d in 7 30 60 90; do
              python sync_dashboard.py --days "$d"
            done
            sync_custom_ranges
          fi

      - name: Commit updated dashboard JSON
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(dashboard): sync Klaviyo data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: sync
    if: needs.sync.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify production deploy
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            echo "Triggering Netlify via build hook…"
            curl -fsS -X POST -d {} "$NETLIFY_BUILD_HOOK"
            exit 0
          fi
          echo "NETLIFY_BUILD_HOOK not set; will dispatch deploy-netlify.yml"

      - name: Trigger deploy-netlify workflow (when no build hook)
        uses: actions/github-script@v7
        env:
          HAS_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        with:
          script: |
            if (process.env.HAS_BUILD_HOOK === "true") {
              core.info("Skipped workflow dispatch; build hook was used");
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "deploy-netlify.yml",
              ref: "main",
            });
            core.info("Triggered deploy-netlify.yml after dashboard data commit");
